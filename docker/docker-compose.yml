services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-shop-postgres
    environment:
      POSTGRES_DB: auto_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auto_shop" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

