services:
  postgres-order:
    image: postgres:16-alpine
    container_name: auto-shop-postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d order_db" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-storage:
    image: postgres:16-alpine
    container_name: auto-shop-postgres-storage
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_storage_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d storage_db" ]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.2
    container_name: auto-shop-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: auto-shop-keycloak
    command: start-dev --import-realm
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep '200' <&3\"" ]
      interval: 10s
      timeout: 5s
      retries: 20

  storage-service:
    container_name: auto-shop-storage-service
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      APP_HTTP_PORT: 8082
      APP_DB_URL: jdbc:postgresql://postgres-storage:5432/storage_db
      APP_DB_USER: postgres
      APP_DB_PASSWORD: postgres
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_ISSUER_URI: http://localhost:8081/realms/auto-shop
      APP_SECURITY_JWK_SET_URI: http://host.docker.internal:8081/realms/auto-shop/protocol/openid-connect/certs
    depends_on:
      postgres-storage:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  order-service:
    container_name: auto-shop-order-service
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_HTTP_PORT: 8080
      APP_DB_URL: jdbc:postgresql://postgres-order:5432/order_db
      APP_DB_USER: postgres
      APP_DB_PASSWORD: postgres
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_STORAGE_BASE_URL: http://storage-service:8082
      APP_SECURITY_ISSUER_URI: http://localhost:8081/realms/auto-shop
      APP_SECURITY_JWK_SET_URI: http://host.docker.internal:8081/realms/auto-shop/protocol/openid-connect/certs
    depends_on:
      postgres-order:
        condition: service_healthy
      storage-service:
        condition: service_started
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_order_data:
  postgres_storage_data:
