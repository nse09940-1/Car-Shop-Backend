databaseChangeLog:
  - changeSet:
      id: 001-create-schema
      author: S
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              create table car_models (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  brand varchar(100) not null,
                  model_code varchar(100) not null,
                  base_price bigint not null,
                  car_type varchar(50) not null,
                  fuel_type varchar(50) not null,
                  horsepower integer not null,
                  engine_volume integer not null,
                  transmission_type varchar(50) not null,
                  drive_type varchar(50) not null
              );

              create table car_model_required_types (
                  model_id uuid not null references car_models(id),
                  required_type varchar(50) not null
              );

              create table app_users (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  name varchar(200) not null,
                  email varchar(200) not null,
                  role varchar(50) not null
              );

              create table wheel_options (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  name varchar(200) not null,
                  surcharge bigint not null,
                  base_option boolean not null,
                  car_part_id uuid not null,
                  diameter integer not null
              );

              create table wheel_option_compatible_model_codes (
                  option_id uuid not null references wheel_options(id),
                  model_code varchar(100) not null
              );

              create table transmission_options (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  name varchar(200) not null,
                  surcharge bigint not null,
                  base_option boolean not null,
                  car_part_id uuid not null,
                  transmission_type varchar(50) not null
              );

              create table transmission_option_compatible_model_codes (
                  option_id uuid not null references transmission_options(id),
                  model_code varchar(100) not null
              );

              create table steering_options (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  name varchar(200) not null,
                  surcharge bigint not null,
                  base_option boolean not null,
                  car_part_id uuid not null,
                  material varchar(100) not null
              );

              create table steering_option_compatible_model_codes (
                  option_id uuid not null references steering_options(id),
                  model_code varchar(100) not null
              );

              create table interior_options (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  name varchar(200) not null,
                  surcharge bigint not null,
                  base_option boolean not null,
                  car_part_id uuid not null,
                  color varchar(100) not null
              );

              create table interior_option_compatible_model_codes (
                  option_id uuid not null references interior_options(id),
                  model_code varchar(100) not null
              );

              create table stock_orders (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  customer_id uuid not null references app_users(id),
                  manager_id uuid not null references app_users(id),
                  car_id uuid not null,
                  status varchar(50) not null,
                  created_time timestamp not null
              );

              create table custom_orders (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  customer_id uuid not null references app_users(id),
                  manager_id uuid not null references app_users(id),
                  car_model_id uuid not null references car_models(id),
                  status varchar(50) not null,
                  total_price bigint not null,
                  created_time timestamp not null,
                  wheel_option_id uuid references wheel_options(id),
                  transmission_option_id uuid references transmission_options(id),
                  steering_option_id uuid references steering_options(id),
                  interior_option_id uuid references interior_options(id)
              );

              create table test_drive_requests (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  customer_id uuid not null references app_users(id),
                  car_id uuid not null,
                  scheduled_at timestamp not null
              );

              create table outbox_events (
                  id uuid primary key,
                  created_at timestamptz not null,
                  updated_at timestamptz not null,
                  removed boolean not null default false,
                  event_type varchar(100) not null,
                  topic varchar(200) not null,
                  aggregate_id uuid not null,
                  trace_id varchar(100) not null,
                  payload text not null,
                  published boolean not null default false,
                  published_at timestamptz
              );

              create table processed_events (
                  id uuid primary key,
                  event_type varchar(100) not null,
                  trace_id varchar(100) not null,
                  order_id uuid not null,
                  processed_at timestamptz not null
              );
