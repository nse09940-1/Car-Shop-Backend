spring:
  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/auto_shop}
    username: ${APP_DB_USER:postgres}
    password: ${APP_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${APP_HTTP_PORT:8080}

