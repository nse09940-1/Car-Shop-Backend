databaseChangeLog:
  - changeSet:
      id: 002-indexes-constraints
      author: S
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              alter table cars add constraint uq_cars_vin unique (vin);
              alter table app_users add constraint uq_users_email unique (email);
              alter table parts add constraint uq_parts_part_number unique (part_number);

              create index idx_car_models_brand on car_models(brand);
              create index idx_cars_model_id on cars(car_model_id);
              create index idx_cars_removed on cars(removed);
              create index idx_parts_removed on parts(removed);
              create index idx_users_removed on app_users(removed);
              create index idx_wheel_options_removed on wheel_options(removed);
              create index idx_transmission_options_removed on transmission_options(removed);
              create index idx_steering_options_removed on steering_options(removed);
              create index idx_interior_options_removed on interior_options(removed);
              create index idx_stock_orders_removed on stock_orders(removed);
              create index idx_custom_orders_removed on custom_orders(removed);
              create index idx_test_drive_removed on test_drive_requests(removed);

